<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - Frade System</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .reg-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .info-text { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="reg-container">
        <h2>Đăng ký thành viên</h2>
        <form action="/register" method="POST" id="regForm">
            <input type="text" name="username" class="form-control mb-3" placeholder="Tên đăng nhập" required>
            <input type="text" name="phone" class="form-control mb-3" placeholder="Số điện thoại" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Mật khẩu" required>
            <input type="hidden" name="device_info" id="device_info">
            <input type="hidden" name="location" id="location">

            <button type="submit">Tạo tài khoản</button>
        </form>
        <p class="info-text" id="status">Đang lấy thông tin bảo mật thiết bị...</p>
        <p><a href="/login">Đã có tài khoản? Đăng nhập</a></p>
    </div>

    <script>
        // Lấy thông tin thiết bị
        document.getElementById('device_info').value = navigator.userAgent;

        // Lấy vị trí GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const loc = position.coords.latitude + "," + position.coords.longitude;
                document.getElementById('location').value = loc;
                document.getElementById('status').innerText = "Đã xác thực thiết bị và vị trí.";
            }, function(error) {
                document.getElementById('status').innerText = "Cảnh báo: Không thể lấy vị trí.";
            });
        }
    </script>
</body>
</html>
